<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeOS | A2A Coordination Intelligence Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #E0E0E0;
            overflow: hidden;
        }
        .glassmorphism {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .forge-gradient-text {
            background: linear-gradient(90deg, #6366F1, #A855F7, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .forge-border-gradient {
            border-image-slice: 1;
            border-image-source: linear-gradient(to right, #6366F1, #A855F7);
        }
        .glow-shadow {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3), 0 0 5px rgba(99, 102, 241, 0.2);
        }
        .log-entry {
            transition: all 0.3s ease;
        }
        .log-entry:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: #A855F7;
            border-radius: 3px;
        }
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="antialiased">
    <canvas id="particle-canvas"></canvas>

    <div class="relative min-h-screen w-full p-4 lg:p-8 flex flex-col">
        <!-- Header -->
        <header class="w-full flex items-center justify-between pb-4 border-b forge-border-gradient">
            <div class="flex items-center space-x-3">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="url(#paint0_linear_header)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 7L12 12L22 7" stroke="url(#paint1_linear_header)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 22V12" stroke="url(#paint2_linear_header)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear_header" x1="2" y1="12" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366F1"/>
                            <stop offset="1" stop-color="#A855F7"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear_header" x1="2" y1="9.5" x2="22" y2="9.5" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366F1"/>
                            <stop offset="1" stop-color="#A855F7"/>
                        </linearGradient>
                        <linearGradient id="paint2_linear_header" x1="12" y1="12" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#A855F7"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="text-2xl lg:text-3xl font-bold tracking-tighter">
                    <span class="forge-gradient-text">ForgeOS</span>
                    <span class="text-gray-400 font-light">| A2A Coordination Intelligence Showcase</span>
                </h1>
            </div>
            <div id="connection-status" class="flex items-center space-x-2 px-3 py-1.5 rounded-full glassmorphism text-sm">
                <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="flex-grow grid grid-cols-1 lg:grid-cols-4 gap-4 lg:gap-8 mt-4 lg:mt-8 overflow-hidden">
            
            <!-- Left Panel: Live Agent Registry -->
            <div class="lg:col-span-1 glassmorphism rounded-2xl p-4 lg:p-6 flex flex-col overflow-hidden glow-shadow">
                <div class="flex items-center space-x-2 mb-4">
                    <i data-lucide="cpu" class="w-6 h-6 text-indigo-400"></i>
                    <h2 class="text-xl font-bold text-gray-100">Live Agent Registry</h2>
                </div>
                <div id="agent-registry" class="flex-grow space-y-3 overflow-y-auto pr-2">
                    <!-- Mock agents will be populated here by JavaScript -->
                </div>
            </div>

            <!-- Center Panel: Task Submission & Live Log -->
            <div class="lg:col-span-2 glassmorphism rounded-2xl p-4 lg:p-6 flex flex-col overflow-hidden">
                <div class="flex items-center space-x-2 mb-4">
                    <i data-lucide="terminal-square" class="w-6 h-6 text-purple-400"></i>
                    <h2 class="text-xl font-bold text-gray-100">Coordination Console</h2>
                </div>
                
                <!-- Task Submission Form -->
                <form id="task-form" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <input type="text" id="task-description" placeholder="Describe a task (e.g., 'Build a login UI')" class="col-span-3 md:col-span-2 bg-gray-900/50 border border-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all" required>
                    <button type="submit" class="col-span-3 md:col-span-1 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold rounded-lg px-4 py-2 transition-all duration-300 transform hover:scale-105 flex items-center justify-center space-x-2">
                        <i data-lucide="send" class="w-4 h-4"></i>
                        <span>Submit Task</span>
                    </button>
                </form>

                <!-- Live Log -->
                <div id="live-log" class="flex-grow bg-black/50 rounded-lg p-4 overflow-y-auto font-mono text-sm leading-relaxed">
                    <div class="log-entry text-gray-400">Waiting for server connection and task submission...</div>
                </div>
            </div>

            <!-- Right Panel: System Analytics -->
            <div class="lg:col-span-1 glassmorphism rounded-2xl p-4 lg:p-6 flex flex-col overflow-hidden">
                <div class="flex items-center space-x-2 mb-4">
                    <i data-lucide="bar-chart-3" class="w-6 h-6 text-pink-400"></i>
                    <h2 class="text-xl font-bold text-gray-100">System Analytics</h2>
                </div>
                <div class="flex-grow space-y-6 flex flex-col justify-around">
                    <div>
                        <h3 class="text-md font-semibold text-gray-300 mb-2">Agent Load Distribution</h3>
                        <canvas id="agent-load-chart"></canvas>
                    </div>
                    <div>
                        <h3 class="text-md font-semibold text-gray-300 mb-2">Task Status Overview</h3>
                        <canvas id="task-status-chart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            // --- Particle Background ---
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const particleCount = 75;

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * 1 - 0.5;
                    this.color = `rgba(168, 85, 247, ${Math.random() * 0.5 + 0.2})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                    if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                particles = [];
                initParticles();
            });


            // --- Mock Data & UI Elements ---
            const agentRegistry = document.getElementById('agent-registry');
            const liveLog = document.getElementById('live-log');
            const taskForm = document.getElementById('task-form');
            const taskDescriptionInput = document.getElementById('task-description');

            const agentTypes = [
                { type: 'design', icon: 'drafting-compass', color: 'text-sky-400' },
                { type: 'frontend', icon: 'layout-template', color: 'text-emerald-400' },
                { type: 'backend', icon: 'server-cog', color: 'text-amber-400' },
                { type: 'qa', icon: 'clipboard-check', color: 'text-rose-400' },
                { type: 'cicd', icon: 'git-branch-plus', color: 'text-cyan-400' },
                { type: 'sre', icon: 'shield-check', color: 'text-violet-400' }
            ];

            // --- Chart.js Analytics ---
            let agentLoadChart, taskStatusChart;
            const agentLoadData = {
                labels: [],
                datasets: [{
                    label: 'Current Load',
                    data: [],
                    backgroundColor: [
                        'rgba(99, 102, 241, 0.6)',
                        'rgba(168, 85, 247, 0.6)',
                        'rgba(236, 72, 153, 0.6)',
                        'rgba(52, 211, 153, 0.6)',
                        'rgba(251, 191, 36, 0.6)',
                    ],
                    borderColor: [
                        'rgba(99, 102, 241, 1)',
                        'rgba(168, 85, 247, 1)',
                        'rgba(236, 72, 153, 1)',
                        'rgba(52, 211, 153, 1)',
                        'rgba(251, 191, 36, 1)',
                    ],
                    borderWidth: 1
                }]
            };
            const taskStatusData = {
                labels: ['Pending', 'Working', 'Completed', 'Failed'],
                datasets: [{
                    label: 'Task Status',
                    data: [0, 0, 0, 0],
                    backgroundColor: [
                        'rgba(251, 191, 36, 0.6)',
                        'rgba(59, 130, 246, 0.6)',
                        'rgba(16, 185, 129, 0.6)',
                        'rgba(239, 68, 68, 0.6)',
                    ],
                     borderColor: [
                        'rgba(251, 191, 36, 1)',
                        'rgba(59, 130, 246, 1)',
                        'rgba(16, 185, 129, 1)',
                        'rgba(239, 68, 68, 1)',
                    ],
                    borderWidth: 1
                }]
            };

            function initCharts() {
                const chartOptions = {
                    plugins: { legend: { labels: { color: '#E0E0E0' } } },
                    scales: { 
                        y: { ticks: { color: '#E0E0E0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#E0E0E0' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                };
                 const doughnutOptions = {
                    plugins: { legend: { position: 'right', labels: { color: '#E0E0E0' } } }
                };

                agentLoadChart = new Chart(document.getElementById('agent-load-chart'), {
                    type: 'bar',
                    data: agentLoadData,
                    options: chartOptions
                });

                taskStatusChart = new Chart(document.getElementById('task-status-chart'), {
                    type: 'doughnut',
                    data: taskStatusData,
                    options: doughnutOptions
                });
            }
            initCharts();

            // --- Live Agent Registry ---
            let liveAgents = {};
            let taskCounters = { pending: 0, working: 0, completed: 0, failed: 0 };

            function renderAgents() {
                console.log('🔍 DEBUG: renderAgents called with liveAgents:', liveAgents);
                agentRegistry.innerHTML = '';
                agentLoadData.labels = [];
                agentLoadData.datasets[0].data = [];
                Object.values(liveAgents).forEach(agent => {
                    console.log('🔍 DEBUG: Rendering agent:', agent);
                    const agentEl = document.createElement('div');
                    agentEl.className = 'glassmorphism p-3 rounded-lg flex items-center space-x-3 transition-all hover:bg-white/5';
                    agentEl.innerHTML = `
                        <i data-lucide="${agent.icon || 'cpu'}" class="w-8 h-8 ${agent.color || 'text-gray-400'}"></i>
                        <div class="flex-grow">
                            <p class="font-semibold text-white">${agent.id}</p>
                            <p class="text-xs text-gray-400 uppercase tracking-wider">${agent.type}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono text-sm text-white">${(agent.load * 100).toFixed(1)}%</p>
                            <p class="text-xs text-gray-400">Load</p>
                        </div>
                    `;
                    agentRegistry.appendChild(agentEl);
                    agentLoadData.labels.push(agent.id);
                    agentLoadData.datasets[0].data.push(agent.load * 100);
                });
                lucide.createIcons();
                agentLoadChart.update();
            }
            
            function updateTaskStatusChart() {
                taskStatusData.datasets[0].data = [
                    taskCounters.pending,
                    taskCounters.working,
                    taskCounters.completed,
                    taskCounters.failed
                ];
                taskStatusChart.update();
            }

            // Initial render (will be populated by server state)
            renderAgents();


            // --- WebSocket Logic ---
            const connectionStatus = document.getElementById('connection-status');
            const statusIndicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            let socket;

            const serverUrl = 'wss://forgeos-a2a-server-bhdbknz4uq-uc.a.run.app';

            function connectWebSocket() {
                logToConsole('Attempting to connect to A2A server...', 'system');
                socket = new WebSocket(serverUrl);

                socket.onopen = () => {
                    statusIndicator.classList.remove('bg-yellow-500', 'bg-red-500', 'animate-pulse');
                    statusIndicator.classList.add('bg-green-500');
                    statusText.textContent = 'Connected';
                    logToConsole('✅ Connection to A2A server established.', 'success');
                    // Request initial state from server
                    socket.send(JSON.stringify({ type: 'GET_STATE' }));
                };

                socket.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        handleServerMessage(message);
                    } catch (e) {
                        logToConsole(`Error parsing server message: ${e.message}`, 'error');
                    }
                };

                socket.onclose = () => {
                    statusIndicator.classList.remove('bg-green-500', 'bg-yellow-500');
                    statusIndicator.classList.add('bg-red-500');
                    statusText.textContent = 'Disconnected';
                    logToConsole('🔌 Connection to A2A server closed. Reconnecting...', 'error');
                    setTimeout(connectWebSocket, 5000);
                };

                socket.onerror = (error) => {
                    statusIndicator.classList.remove('bg-green-500', 'bg-yellow-500');
                    statusIndicator.classList.add('bg-red-500');
                    statusText.textContent = 'Error';
                    logToConsole(`❌ WebSocket Error: ${error.message || 'Could not connect.'}`, 'error');
                };
            }

            connectWebSocket();

            function handleServerMessage(message) {
                // Debug: Log all received messages
                console.log('🔍 DEBUG: Received message:', message);
                
                // Log the server message
                if (message.payload && message.payload.log) {
                    logToConsole(`SERVER: ${message.payload.log}`, message.payload.log_type || 'info');
                }
                  
                // Handle different message types
                if (message.type === 'STATE_UPDATE' || message.type === 'INITIAL_STATE') {
                    console.log('🔍 DEBUG: Processing state update, agents:', message.payload?.agents);
                    if (message.payload.agents) {
                        // Update live agents from server
                        liveAgents = {};
                        Object.values(message.payload.agents).forEach(serverAgent => {
                            const agentSpec = agentTypes.find(spec => spec.type === serverAgent.type) || 
                                           { icon: 'cpu', color: 'text-gray-400' };
                            liveAgents[serverAgent.id] = {
                                id: serverAgent.id,
                                type: serverAgent.type,
                                icon: agentSpec.icon,
                                color: agentSpec.color,
                                load: serverAgent.load || Math.random() * 0.6,
                                status: serverAgent.status || 'active'
                            };
                        });
                        renderAgents();
                    }
                    if (message.payload.tasks) {
                        taskCounters = message.payload.tasks;
                        updateTaskStatusChart();
                    }
                }
                
                // Handle task updates
                if (message.type === 'TASK_UPDATE') {
                    const task = message.payload;
                    logToConsole(`Task ${task.status}: ${task.description}`, 'task');
                    
                    // Update task counters based on status
                    if (task.status === 'assigned') {
                        taskCounters.pending++;
                        logToConsole(`Task assigned to agent: ${task.agent_id}`, 'agent');
                    } else if (task.status === 'working') {
                        taskCounters.pending--;
                        taskCounters.working++;
                    } else if (task.status === 'completed') {
                        taskCounters.working--;
                        taskCounters.completed++;
                        logToConsole(`✅ Task completed successfully!`, 'success');
                    } else if (task.status === 'failed') {
                        taskCounters.working--;
                        taskCounters.failed++;
                        logToConsole(`❌ Task failed`, 'error');
                    }
                    updateTaskStatusChart();
                }
                
                // Handle agent events
                if (message.type === 'AGENT_REGISTERED') {
                    const agent = message.payload;
                    logToConsole(`New agent registered: ${agent.id} (${agent.type})`, 'agent');
                    // Agent will be included in next state update
                }
                
                if (message.type === 'AGENT_DISCONNECTED') {
                    const agentId = message.payload.agent_id;
                    logToConsole(`Agent disconnected: ${agentId}`, 'error');
                    if (liveAgents[agentId]) {
                        delete liveAgents[agentId];
                        renderAgents();
                    }
                }
            }

            function logToConsole(message, type = 'info') {
                const entry = document.createElement('div');
                const timestamp = new Date().toLocaleTimeString();
                let colorClass = 'text-gray-400';
                let icon = 'chevrons-right';

                switch (type) {
                    case 'system': colorClass = 'text-indigo-400'; icon = 'settings-2'; break;
                    case 'success': colorClass = 'text-emerald-400'; icon = 'check-circle'; break;
                    case 'error': colorClass = 'text-red-400'; icon = 'alert-triangle'; break;
                    case 'info': colorClass = 'text-sky-400'; icon = 'info'; break;
                    case 'task': colorClass = 'text-purple-400'; icon = 'terminal-square'; break;
                    case 'agent': colorClass = 'text-amber-400'; icon = 'cpu'; break;
                }

                entry.className = `log-entry ${colorClass} flex items-start space-x-2 mb-1`;
                entry.innerHTML = `
                    <i data-lucide="${icon}" class="w-4 h-4 mt-0.5 flex-shrink-0"></i>
                    <span class="flex-grow"><span class="text-gray-600 mr-2">[${timestamp}]</span>${message}</span>
                `;
                
                // Remove placeholder if it exists
                if (liveLog.children.length === 1 && liveLog.children[0].textContent.startsWith('Waiting for server')) {
                    liveLog.innerHTML = '';
                }

                liveLog.appendChild(entry);
                liveLog.scrollTop = liveLog.scrollHeight;
                lucide.createIcons();
            }

            // --- Task Submission ---
            taskForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const description = taskDescriptionInput.value;
                if (!description || !socket || socket.readyState !== WebSocket.OPEN) {
                    logToConsole('Cannot submit task. Not connected to server.', 'error');
                    return;
                }

                const task = {
                    type: 'SUBMIT_TASK',
                    payload: {
                        description: description,
                        priority: 'normal',
                        task_type: 'implementation'
                    }
                };
                
                // Send task to live server
                socket.send(JSON.stringify(task));
                logToConsole(`Task submitted: "${description}"`, 'task');
                taskDescriptionInput.value = '';
            });

        });
    </script>
</body>
</html>
